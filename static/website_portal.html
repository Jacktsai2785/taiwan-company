<head>

<title>官網手動補填 Portal</title>
<style>
  :root{--bg:#0f1115;--card:#1a1d24;--bd:#2a2f3a;--fg:#e6e8eb;--mut:#9aa3b2;--ok:#2ecc71;--warn:#e0b341;--acc:#4a9eff;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,"Noto Sans TC",Segoe UI,sans-serif}
  header{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;z-index:10}
  header h1{font-size:16px;margin:0}
  .stat{color:var(--mut);font-size:13px}
  .stat b{color:var(--fg)}
  .wrap{max-width:1100px;margin:0 auto;padding:16px 20px 80px}
  .toolbar{display:flex;gap:10px;margin:10px 0 16px;flex-wrap:wrap;align-items:center}
  input[type=text],input[type=url]{background:#11141a;border:1px solid var(--bd);color:var(--fg);border-radius:6px;padding:7px 10px;font-size:13px}
  input.q{width:240px}
  button{background:var(--acc);color:#fff;border:0;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:13px}
  button.ghost{background:transparent;border:1px solid var(--bd);color:var(--fg)}
  button:disabled{opacity:.4;cursor:default}
  table{width:100%;border-collapse:collapse}
  th,td{padding:9px 10px;border-bottom:1px solid var(--bd);text-align:left;vertical-align:top}
  th{color:var(--mut);font-weight:600;font-size:12px;position:sticky;top:60px;background:var(--bg)}
  td .nm{font-weight:600}
  td .sub{color:var(--mut);font-size:12px}
  td.note{color:var(--warn);font-size:12px;max-width:300px}
  td.url input{width:100%}
  td.act{white-space:nowrap}
  .row-saved{opacity:.45}
  .badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;background:#222834;color:var(--mut)}
  .msg{font-size:12px;margin-left:8px}
  .msg.ok{color:var(--ok)} .msg.err{color:#ff6b6b}
  .hint{color:var(--mut);font-size:12px;margin-bottom:8px}
  a{color:var(--acc)}
</style>
</head>
<body>
<header>
  <h1>🌐 官網手動補填 Portal</h1>

    <input class="q" id="q" type="text" placeholder="篩選公司名 / 統編…" oninput="render()">

    <span style="flex:1"></span>
    <button id="saveAll" class="ghost" onclick="saveAll()">全部儲存有填的</button>

let companies = [];      // 仍無官網的
let savedCount = 0;
const hasSite = c => c.website && String(c.website).trim();

async function load(){
  const r = await fetch('/api/companies?sort_by=name');
  const all = await r.json();
  companies = all.filter(c=>!hasSite(c));
  document.getElementById('cntLeft').textContent = companies.length;
  // 產業下拉
  const inds = [...new Set(companies.map(c=>c.industry||'其他'))].sort();
  const sel = document.getElementById('indFilter');
  sel.innerHTML = '<option value="">全部產業</option>'+inds.map(i=>`<option>${i}</option>`).join('');
  render();
}

function render(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  const ind = document.getElementById('indFilter').value;
  const tb = document.getElementById('tb');
  let rows = companies.filter(c=>{
    if(ind && (c.industry||'其他')!==ind) return false;
    if(q){ return (c.name||'').toLowerCase().includes(q) || (c.tax_id||'').includes(q); }
    return true;
  });
  tb.innerHTML = rows.map(c=>{
    const note = NOTES[c.id] || '';
    return `<tr id="row-${c.id}">
      <td><div class="nm">${esc(c.name)}</div><div class="sub">統編 ${esc(c.tax_id||'—')}</div></td>
      <td><span class="badge">${esc(c.industry||'其他')}</span></td>
      <td class="note">${esc(note)}</td>
      <td class="url">
        <div style="display:flex;gap:6px;align-items:center">
          <input type="url" id="in-${c.id}" placeholder="https://…"
                 onkeydown="if(event.key==='Enter')save('${c.id}')">
          <button onclick="save('${c.id}')">存</button>
          <span class="msg" id="msg-${c.id}"></span>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function save(id){
  const inp = document.getElementById('in-'+id);
  let url = (inp.value||'').trim();
  const msg = document.getElementById('msg-'+id);
  if(!url){ msg.className='msg err'; msg.textContent='請先填網址'; return; }
  if(!/^https?:\/\//i.test(url)) url='https://'+url;
  msg.className='msg'; msg.textContent='儲存中…';
  try{
    const r = await fetch('/api/companies/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({website:url})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    msg.className='msg ok'; msg.textContent='✓ 已存 '+url;
    const row=document.getElementById('row-'+id); row.classList.add('row-saved');
    inp.disabled=true; row.querySelector('button').disabled=true;
    savedCount++; document.getElementById('cntSaved').textContent=savedCount;
    // 從待辦移除(下次 render/refresh 不再出現)
    companies = companies.filter(c=>c.id!==id);
    document.getElementById('cntLeft').textContent = companies.length;
  }catch(e){ msg.className='msg err'; msg.textContent='✗ 失敗 '+e.message; }
}

async function saveAll(){
  const ids = companies.map(c=>c.id);
  for(const id of ids){
    const inp=document.getElementById('in-'+id);
    if(inp && inp.value.trim()) await save(id);
  }
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
load();
